<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- 背景：深夜藍黒 -->
  <rect width="192" height="192" rx="36" fill="#070B14"/>
  <!-- 星粒 -->
  <circle cx="30"  cy="28"  r="1.2" fill="#E8EFF8" opacity=".8"/>
  <circle cx="158" cy="22"  r="1.5" fill="#C8A84B" opacity=".9"/>
  <circle cx="172" cy="55"  r="1.0" fill="#E8EFF8" opacity=".6"/>
  <circle cx="18"  cy="70"  r="1.2" fill="#E8EFF8" opacity=".5"/>
  <circle cx="165" cy="140" r="1.0" fill="#C8A84B" opacity=".7"/>
  <circle cx="25"  cy="155" r="1.2" fill="#E8EFF8" opacity=".6"/>
  <circle cx="145" cy="168" r="1.0" fill="#E8EFF8" opacity=".5"/>
  <circle cx="55"  cy="172" r="1.5" fill="#C8A84B" opacity=".8"/>
  <circle cx="80"  cy="18"  r="1.0" fill="#E8EFF8" opacity=".6"/>
  <circle cx="120" cy="175" r="1.0" fill="#E8EFF8" opacity=".5"/>
  <!-- 朱の細線（上部アクセント） -->
  <line x1="40" y1="44" x2="152" y2="44" stroke="#C8402A" stroke-width="1.5" opacity=".6"/>
  <!-- 漢字「内省」 -->
  <text x="96" y="118" 
    font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif"
    font-size="64"
    font-weight="400"
    fill="#FAF7F0"
    text-anchor="middle"
    letter-spacing="4">内省</text>
  <!-- 下部の金の点線 -->
  <line x1="60" y1="142" x2="132" y2="142" stroke="#C8A84B" stroke-width="1" opacity=".5" stroke-dasharray="3,4"/>
  <!-- naisei -->
  <text x="96" y="162"
    font-family="'Helvetica Neue','Arial',sans-serif"
    font-size="11"
    font-weight="300"
    fill="#8A9BB5"
    text-anchor="middle"
    letter-spacing="3">naisei</text>
</svg>
